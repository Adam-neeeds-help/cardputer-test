name: 'CI'

on:
  push:

jobs:
  build_linux:
    runs-on: ubuntu-latest
    steps:
      - name: 'Wipe workspace'
        run: find ./ -mount -maxdepth 1 -exec rm -rf {} \;

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: false
          context: docker
          tags: qflipper-build:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build application in docker
        run: docker run --rm --privileged -v $(pwd):/project qflipper-build:latest /project/build_linux.sh

      - name: Publish application
        uses: actions/upload-artifact@v4
        with:
          name: QPuter-x86_64.AppImage
          path: |
                ./build/QPuter-x86_64.AppImage
          if-no-files-found: error
          retention-days: 1

  build_mac:
    runs-on: [self-hosted, ARM64, macOS, qFlipper]
    env:
      MAC_OS_KEYCHAIN_NAME: ${{ secrets.MAC_OS_KEYCHAIN_NAME }}
      MAC_OS_KEYCHAIN_PASSWORD: ${{ secrets.MAC_OS_KEYCHAIN_PASSWORD }}
      MAC_OS_SIGNING_KEY_ID: ${{ secrets.MAC_OS_SIGNING_KEY_ID }}
      MAC_OS_SIGNING_TEAM_ID: ${{ secrets.MAC_OS_SIGNING_TEAM_ID }}
      MAC_OS_SIGNING_USERNAME: ${{ secrets.MAC_OS_SIGNING_USERNAME }}
      MAC_OS_SIGNING_PASSWORD: ${{ secrets.MAC_OS_SIGNING_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Build application
        run: ./build_mac.sh

      - name: Publish application
        uses: actions/upload-artifact@v4
        with:
          name: QPuter.dmg
          path: |
            ./build_mac/QPuter.dmg
          if-no-files-found: error
          retention-days: 1

  build_windows:
    runs-on: windows-latest
    env:
        SIGNING_TOOL: ${{ secrets.WIN_SIGNING_TOOL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0  # must to be there, see installer_windows.nsi file for details

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: '14.29'

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.2'
          arch: 'win64_msvc2019_64'
          modules: 'qt5compat qtserialport'
          cache: true

      - name: Install NSIS
        run: choco install nsis -y

      - name: Download STM32 DFU driver
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://cdn.flipperzero.one/STM32_DFU_USB_Driver.zip" -OutFile "$env:RUNNER_TEMP\stm32_driver.zip"
          Expand-Archive -Force -Path "$env:RUNNER_TEMP\stm32_driver.zip" -DestinationPath "C:\STM32 Driver"

      - name: Build application
        run: .\build_windows.bat

      - name: Publish application
        uses: actions/upload-artifact@v4
        with:
          name: QPuterSetup-64bit.exe
          path: |
            .\build\QPuterSetup-64bit.exe
            .\build\QPuter-64bit.zip
          if-no-files-found: error
          retention-days: 1

  upload:
    name: Upload apps to storage
    needs: [build_windows, build_mac, build_linux]
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Make artifacts directory'
        run: |
          test -d artifacts && rm -rf artifacts || true
          mkdir artifacts

      - name: 'Generate tag suffix'
        if: startsWith(github.ref, 'refs/tags/') == true
        run: |
          echo "REF=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
          echo "SUFFIX=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

      - name: 'Generate branch suffix'
        if: startsWith(github.ref, 'refs/tags/') != true
        run: |
          echo "REF=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
          echo "SUFFIX=$(git rev-parse --abbrev-ref HEAD | sed 's/\//_/g')-$(date +'%d%m%Y')-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4
        with:
          name: QPuter-x86_64.AppImage
      - uses: actions/download-artifact@v4
        with:
          name: QPuterSetup-64bit.exe
      - uses: actions/download-artifact@v4
        with:
          name: QPuter.dmg

      - name: Rename app
        run: |
            mv QPuter-x86_64.AppImage ./artifacts/QPuter-x86_64-${SUFFIX}.AppImage
            mv QPuterSetup-64bit.exe ./artifacts/QPuterSetup-64bit-${SUFFIX}.exe
            mv QPuter-64bit.zip ./artifacts/QPuter-64bit-${SUFFIX}.zip
            mv QPuter.dmg ./artifacts/QPuter-${SUFFIX}.dmg

      - name: Upload artifacts to update server
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: |
          FILES=$(for CUR in $(ls artifacts/); do echo "-F files=@artifacts/$CUR"; done)
          curl --fail -L -H "Token: ${{ secrets.INDEXER_TOKEN }}" \
              -F "branch=${REF}" \
              ${FILES[@]} \
              "${{ secrets.INDEXER_URL }}"/qFlipper/uploadfiles
